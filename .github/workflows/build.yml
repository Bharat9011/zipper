name: Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            build-cmd: linux
            binary-ext: ""
          - os: macos-latest
            build-cmd: macos
            binary-ext: ""
          - os: windows-latest
            build-cmd: windows
            binary-ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter (Includes Dart)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Enable Desktop Support
        run: |
          flutter config --enable-linux-desktop
          flutter config --enable-macos-desktop
          flutter config --enable-windows-desktop

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test

      - name: Build Desktop App
        run: flutter build ${{ matrix.build-cmd }} --release

      - name: Compile Executable Tool
        run: dart compile exe bin/zipper.dart -o build/zipper${{ matrix.binary-ext }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: universal-video-downloader-${{ matrix.os }}
          path: |
            build/**/release/
            build/zipper${{ matrix.binary-ext }}